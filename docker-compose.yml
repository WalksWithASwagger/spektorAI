services:
  transcription:
    build:
      context: .
      dockerfile: services/transcription/Dockerfile
    env_file:
      - .env
    environment:
      - WHISPERFORGE_LOG_LEVEL=INFO
    networks:
      - whisperforge-net
    volumes:
      - audio_cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  processing:
    build:
      context: .
      dockerfile: services/processing/Dockerfile
    env_file:
      - .env
    environment:
      - WHISPERFORGE_LOG_LEVEL=INFO
    networks:
      - whisperforge-net
    volumes:
      - processing_cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  storage:
    build:
      context: .
      dockerfile: services/storage/Dockerfile
    env_file:
      - .env
    environment:
      - WHISPERFORGE_LOG_LEVEL=INFO
    networks:
      - whisperforge-net
    volumes:
      - storage_cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    env_file:
      - .env
    environment:
      - DEPLOY_MODE=services
      - TRANSCRIPTION_URL=http://transcription:8000
      - PROCESSING_URL=http://processing:8000
      - STORAGE_URL=http://storage:8000
    ports:
      - "8501:8501"
    networks:
      - whisperforge-net
    volumes:
      - frontend_cache:/app/cache
    depends_on:
      transcription:
        condition: service_healthy
      processing:
        condition: service_healthy
      storage:
        condition: service_healthy

networks:
  whisperforge-net:
    driver: bridge

volumes:
  frontend_cache:
  audio_cache:
  processing_cache:
  storage_cache:
